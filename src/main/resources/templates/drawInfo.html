<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>응모 페이지</title>
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    
    <style>
        .draw-box {
            border: 1px solid black;
            width: 400px;
            padding: 20px;
            margin: 100px auto;
            text-align: center;
            font-size: 18px;
            box-shadow: 2px 2px 5px #aaa;
        }

        .submit-btn {
            margin: 30px auto;
            display: block;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ddd;
            border: none;
            cursor: pointer;
        }

        select {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #ddd;
            font-size: 16px;
        }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }
        
    </style>
</head>
<body>
	
    <div th:replace="layout/header :: header"></div>

	<main>
	    <form action="/draw" method="post">
	        <div class="draw-box">
	            <div>당첨 일자: <span th:text="${#temporals.format(drawInfo.drawTime, 'yyyy-MM-dd')}">2025-07-16</span></div>
	            <div>상품명: <span th:text="${drawInfo.productName}">TEST PRODUCT</span></div>
	            <div>사이즈 선택</div>
	            <select name="size">
	                <option value="free">FREE</option>
	            </select>
	
	            <!-- 숨겨진 상품 ID 및 유저 ID 전달 (예시용) -->
	            <input type="hidden" name="pidx" value="1"/>
				<input type="hidden" name="uidx" th:value="${uidx}"/>
	        </div>
	
			<button type="submit" id="submit-btn" class="submit-btn">응모 완료하기</button>
	    </form>
    </main>
    
    <th:block th:replace="layout/footer :: footerFragment"></th:block>

</body>
<script>
  document.getElementById("submit-btn").addEventListener("click", function(e) {
    e.preventDefault();

    const product_id = document.querySelector('input[name="pidx"]').value;
    const user_id = document.querySelector('input[name="uidx"]').value;
    const size = document.querySelector('select[name="size"]').value;

	fetch("/draw", {
	      method: "POST",
	      headers: {
	        "Content-Type": "application/x-www-form-urlencoded"
	      },
	      body: new URLSearchParams({
	        pidx: product_id,
	        uidx: user_id,
	        size: size
	      })
	    })
	    .then(response => response.json())
	    .then(data => {
	      alert(data.message); 
		  window.location.href = "/main-page";
	    })
	    .catch(error => {
	      alert("응모 중 오류가 발생했습니다.");
	    });
	  });
</script>

</html>
