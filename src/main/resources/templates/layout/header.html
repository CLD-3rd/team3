<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
</head>
<body>
<div th:fragment="header">
    <header class="header">
        <div class="header-left">
            <a th:href="@{/main-page}" class="header-logo">
                <img th:src="@{/images/fastpick.png}" alt="FastPick Logo" />
                <span class="brand-name">FastPick</span>
            </a>
        </div>
        <div class="header-right">
            <a th:href="@{/sign-up}">
                <button>회원가입</button>
            </a>
            <a th:href="@{/login}">
            <button>로그인</button>
            </a>
        </div>
    </header>
</div>
</body>
</html>
